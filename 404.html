<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — DailyOS</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f0f13;
      color: #e8e8ed;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
    }
    .container { padding: 2rem; max-width: 400px; }
    h1 { font-size: 4rem; color: #5b8dee; margin-bottom: 1rem; }
    p { color: #9d9db5; margin-bottom: 2rem; line-height: 1.6; }
    a {
      display: inline-block;
      padding: 0.75rem 1.5rem;
      background: #5b8dee;
      color: #fff;
      border-radius: 8px;
      text-decoration: none;
      font-weight: 500;
      transition: background 0.2s;
    }
    a:hover { background: #4a7de0; }
    @media (prefers-color-scheme: light) {
      body { background: #f5f5f8; color: #1a1a2e; }
      p { color: #6b6b85; }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>404</h1>
    <p>Cette page n'existe pas ou a été déplacée.</p>
    <a href="/">Retour à DailyOS</a>
  </div>
</body>
</html>
