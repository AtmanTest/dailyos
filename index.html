<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0f0f13">
  <meta name="description" data-i18n="desc" content="Daily TDAH — Journal personnel conçu pour les cerveaux TDAH. Rapide, visuel, sans distraction.">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta property="og:title" data-i18n="app_name" content="Daily TDAH">
  <meta property="og:description" data-i18n="desc" content="Journal personnel conçu pour les cerveaux TDAH. Rapide, visuel, sans distraction.">
  <title>Daily TDAH</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>">

  <!-- Styles -->
  <link rel="stylesheet" href="assets/css/app.css?v=4">

  <!-- Scripts (order matters) -->
  <script src="assets/js/config.js?v=4"></script>
  <script src="assets/js/state.js?v=4"></script>
  <script src="assets/js/charts.js?v=4"></script>
  <script src="assets/js/ui.js?v=4"></script>
  <script src="assets/js/demo-data.js?v=4"></script>
  <script src="assets/js/i18n.js?v=4"></script>
  <script src="assets/js/api.js?v=4"></script>
  <script src="assets/js/auth.js?v=4"></script>
  <script src="assets/js/router.js?v=4"></script>
  <script src="assets/js/pages/today.js?v=4"></script>
  <script src="assets/js/pages/journal.js?v=4"></script>
  <script src="assets/js/pages/ideas.js?v=4"></script>
  <script src="assets/js/pages/reminders.js?v=4"></script>
  <script src="assets/js/pages/insights.js?v=4"></script>
  <script src="assets/js/pages/settings.js?v=4"></script>
  <script src="assets/js/app.js?v=4"></script>
</head>
<body>
  <div class="app-wrapper">
    <!-- Header (rendered by JS) -->
    <div id="app-header"></div>

    <!-- Sidebar (rendered by JS) -->
    <div id="app-sidebar"></div>

    <!-- Main content -->
    <main id="app" class="main-content" role="main">
      <noscript>
        <div class="noscript-msg">
          <h2 data-i18n="app_name">Daily TDAH</h2>
          <p>Veuillez activer JavaScript pour utiliser cette application.</p>
        </div>
      </noscript>
    </main>
  </div>

  <!-- FAB Quick Entry -->
  <button class="fab-quick-entry adhd-pulse" id="fab-quick-entry" aria-label="Quick entry">+</button>

  <!-- Bottom nav (rendered by JS) -->
  <div id="app-bottom-nav"></div>

  <!-- Toast container -->
  <div id="toast-container" class="toast-container" aria-live="polite" aria-atomic="true"></div>

  <!-- Service worker registration stub -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js').catch(() => {
          // Silent fail
        });
      });
    }
  </script>
</body>
</html>
