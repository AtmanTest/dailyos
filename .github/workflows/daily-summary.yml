# ============================================================================
# DailyOS — Daily Summary Generator
# ============================================================================
# Runs daily at 03:00 Europe/Paris (cron UTC = '0 2 * * *' in winter,
# '0 1 * * *' in summer — Python handles DST adjustment internally).
# Also supports manual trigger with custom date and dry-run mode.
# ============================================================================
name: Daily Summary

on:
  schedule:
    # 02:00 UTC = 03:00 CET (winter) / 04:00 CEST (summer)
    # Python script handles DST offset internally
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      date:
        description: 'Date to summarize (YYYY-MM-DD). Defaults to yesterday.'
        required: false
        type: string
        default: ''
      dry_run:
        description: 'Run in dry-run mode (no DB writes)'
        required: false
        type: boolean
        default: false

concurrency:
  group: daily-summary
  cancel-in-progress: true

jobs:
  summarize:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r scripts/requirements.txt

      - name: Determine date
        id: date
        run: |
          if [ -n "${{ inputs.date }}" ]; then
            echo "target_date=${{ inputs.date }}" >> $GITHUB_OUTPUT
          else
            echo "target_date=$(date -d 'yesterday' +%Y-%m-%d)" >> $GITHUB_OUTPUT
          fi

      - name: Run dry-run (no Supabase configured)
        if: ${{ secrets.SUPABASE_URL == '' }}
        run: |
          echo "⚠️  No Supabase URL configured — running dry-run mode"
          python3 scripts/summarize_day.py \
            --date ${{ steps.date.outputs.target_date }} \
            --dry-run

      - name: Run summary with Supabase
        if: ${{ secrets.SUPABASE_URL != '' }}
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          DRY_RUN_FLAG=""
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            DRY_RUN_FLAG="--dry-run"
          fi
          python3 scripts/summarize_day.py \
            --supabase-url "$SUPABASE_URL" \
            --service-key "$SUPABASE_SERVICE_ROLE_KEY" \
            --date ${{ steps.date.outputs.target_date }} \
            $DRY_RUN_FLAG
