# ============================================================================
# Daily ADHD — CI Workflow v2.1
# Runs on every push to main/develop and every pull request to main
# Jobs: python-tests | frontend-structure | i18n-check | secret-scan | e2e
# ============================================================================
name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  # ─────────────────────────────────────────────
  python-tests:
    name: Python Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r scripts/requirements.txt
      - name: Run pytest
        run: pytest scripts/test_scripts.py -v --tb=short
      - name: Validate data files
        run: python3 scripts/validate_data.py

  # ─────────────────────────────────────────────
  frontend-structure:
    name: Frontend Structure Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check critical files exist
        run: |
          files=(
            "index.html" "assets/css/app.css" "assets/js/config.js"
            "assets/js/i18n.js" "assets/js/app.js" "assets/js/api.js"
            "assets/js/auth.js" "assets/js/router.js" "assets/js/state.js"
            "assets/js/ui.js" "assets/js/pages/today.js"
            "assets/js/pages/journal.js" "assets/js/pages/ideas.js"
            "assets/js/pages/reminders.js" "assets/js/pages/insights.js"
            "assets/js/pages/settings.js" ".github/workflows/pages.yml"
          )
          all_ok=true
          for f in "${files[@]}"; do
            if [ ! -f "$f" ]; then echo "❌ MISSING: $f"; all_ok=false;
            else echo "✅ OK: $f"; fi
          done
          [ "$all_ok" = true ] || exit 1
      - name: Check cache-busting consistency
        run: |
          versions=$(grep -oP '\?v=\K[0-9]+' index.html | sort -u)
          count=$(echo "$versions" | wc -l)
          [ "$count" -le 1 ] || { echo "⚠️ Mixed ?v= versions: $versions"; exit 1; }
          echo "✅ Cache-busting OK: ?v=$versions"
      - name: Check pages.yml path is unchanged
        run: |
          grep -q "path: '.'" .github/workflows/pages.yml \
            || { echo "❌ pages.yml path modified!"; exit 1; }
          echo "✅ pages.yml OK"

  # ─────────────────────────────────────────────
  i18n-check:
    name: i18n Parity Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Check FR/EN key parity
        run: |
          node - <<'EOF'
          const fs = require('fs');
          const src = fs.readFileSync('assets/js/i18n.js', 'utf8');
          const frMatch = src.match(/fr\s*:\s*\{([^}]+(?:\{[^}]*\}[^}]*)*)\}/s);
          const enMatch = src.match(/en\s*:\s*\{([^}]+(?:\{[^}]*\}[^}]*)*)\}/s);
          if (!frMatch || !enMatch) { console.error('❌ fr or en block not found'); process.exit(1); }
          const extractKeys = b => { const k=[],r=/['"]([\w_]+)['"]\s*:/g; let m; while((m=r.exec(b))!==null)k.push(m[1]); return new Set(k); };
          const frKeys = extractKeys(frMatch[1]);
          const enKeys = extractKeys(enMatch[1]);
          const missingEn = [...frKeys].filter(k=>!enKeys.has(k));
          const missingFr = [...enKeys].filter(k=>!frKeys.has(k));
          if(missingEn.length) console.error('❌ Missing in EN:', missingEn.join(', '));
          if(missingFr.length) console.error('❌ Missing in FR:', missingFr.join(', '));
          if(missingEn.length||missingFr.length) process.exit(1);
          console.log(`✅ i18n parity OK — ${frKeys.size} FR keys, ${enKeys.size} EN keys`);
          EOF

  # ─────────────────────────────────────────────
  secret-scan:
    name: Secret Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Scan for secrets
        run: |
          found=false
          grep -rn 'ghp_[A-Za-z0-9]\{36,\}' . --exclude-dir=.git --include='*.js' --include='*.ts' --include='*.json' --include='*.md' --include='*.yml' && found=true || true
          grep -rn 'sk-[A-Za-z0-9]\{32,\}' . --exclude-dir=.git --include='*.js' --include='*.ts' --include='*.json' && found=true || true
          grep -rn 'sbp_[A-Za-z0-9]\{40,\}' . --exclude-dir=.git --include='*.js' --include='*.ts' --include='*.json' && found=true || true
          [ "$found" = false ] || { echo "❌ Secrets detected"; exit 1; }
          echo "✅ No secrets found"

  # ─────────────────────────────────────────────
  e2e:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    needs: [frontend-structure]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install Playwright
        run: |
          npm install
          npx playwright install chromium --with-deps
      - name: Run Playwright smoke tests
        run: npx playwright test --project=chromium
      - name: Upload test report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
