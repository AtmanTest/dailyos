# ============================================================================
# DailyOS — CI Workflow
# ============================================================================
name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r scripts/requirements.txt

      - name: Run automated tests
        run: pytest scripts/test_scripts.py -v

      - name: Validate data files
        run: python3 scripts/validate_data.py

      - name: Check for leaked secrets
        run: |
          echo "Checking for secrets in committed files..."
          grep -r 'ghp_\|sk-\|sbp_' . --exclude-dir=.git --exclude-dir=node_modules --exclude-dir=__pycache__ || echo "✅ No secrets found"
