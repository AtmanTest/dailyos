# ============================================================================
# DailyOS — Weekly Review Generator
# ============================================================================
# Runs every Sunday at 03:30 Europe/Paris.
# Manual trigger with workflow_dispatch for testing.
# ============================================================================
name: Weekly Review

on:
  schedule:
    # 01:30 UTC = 02:30 CET / 03:30 CEST — Python handles DST internally
    - cron: '30 1 * * 0'
  workflow_dispatch:
    inputs:
      date:
        description: 'End date of the week (YYYY-MM-DD). Defaults to last Sunday.'
        required: false
        type: string
        default: ''
      dry_run:
        description: 'Run in dry-run mode (no DB writes)'
        required: false
        type: boolean
        default: false

concurrency:
  group: weekly-review
  cancel-in-progress: true

jobs:
  review:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r scripts/requirements.txt

      - name: Determine week end date
        id: date
        run: |
          if [ -n "${{ inputs.date }}" ]; then
            echo "end_date=${{ inputs.date }}" >> $GITHUB_OUTPUT
          else
            echo "end_date=$(date -d 'last sunday' +%Y-%m-%d)" >> $GITHUB_OUTPUT
          fi

      - name: Run dry-run (no Supabase configured)
        if: ${{ secrets.SUPABASE_URL == '' }}
        run: |
          echo "⚠️  No Supabase URL configured — running dry-run mode"
          python3 scripts/weekly_review.py \
            --date ${{ steps.date.outputs.end_date }} \
            --dry-run

      - name: Run weekly review with Supabase
        if: ${{ secrets.SUPABASE_URL != '' }}
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          DRY_RUN_FLAG=""
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            DRY_RUN_FLAG="--dry-run"
          fi
          python3 scripts/weekly_review.py \
            --supabase-url "$SUPABASE_URL" \
            --service-key "$SUPABASE_SERVICE_ROLE_KEY" \
            --date ${{ steps.date.outputs.end_date }} \
            $DRY_RUN_FLAG
